function moveH(id,dir) {
  var habits=STORE.habits.map(function(h,i){return h.order===undefined?Object.assign({},h,{order:i}):h;});
  habits.sort(function(a,b){return (a.order||0)-(b.order||0);});
  var idx=habits.findIndex(function(h){return h.id===id;});
  var si=idx+dir;
  if(si<0||si>=habits.length) return;
  var tmp=habits[idx].order;
  habits[idx]   =Object.assign({},habits[idx],   {order:habits[si].order});
  habits[si]    =Object.assign({},habits[si],    {order:tmp});

  sb.from('habits').update({order:habits[idx].order}).eq('id',habits[idx].id);
  sb.from('habits').update({order:habits[si].order}).eq('id',habits[si].id);
}

function periodCount(hid,freq) {
  var cs=STORE.completions.filter(function(c){return c.hid===hid;});
  if(freq==='daily') return cs.filter(function(c){return c.d===_today();}).length;
  if(freq==='weekly'){var now=new Date(),day=now.getDay(),start=new Date(now);start.setDate(now.getDate()-day);var end=new Date(start);end.setDate(start.getDate()+7);var ss=start.toISOString().split('T')[0],es=end.toISOString().split('T')[0];return cs.filter(function(c){return c.d>=ss&&c.d<es;}).length;}
  if(freq==='monthly'){var m=_month();return cs.filter(function(c){return c.d.substring(0,7)===m;}).length;}
  return 0;
}
function getStreak(hid) {
  var cs=STORE.completions.filter(function(c){return c.hid===hid;}).map(function(c){return c.d;}).sort().reverse();
  if(!cs.length) return 0;
  var s=0,d=new Date(_today());
  for(var i=0;i<400;i++){var ds=d.toISOString().split('T')[0];if(cs.includes(ds)){s++;d.setDate(d.getDate()-1);}else if(i===0){d.setDate(d.getDate()-1);}else break;}
  return s;
}
function getWeeklyStreak(hid,target) {
  var cs=STORE.completions.filter(function(c){return c.hid===hid;});
  var streak=0,now=new Date();
  for(var i=1;i<=52;i++){var wStart=new Date(now);wStart.setDate(now.getDate()-now.getDay()-(i-1)*7);wStart.setHours(0,0,0,0);var wEnd=new Date(wStart);wEnd.setDate(wStart.getDate()+7);var ss=wStart.toISOString().split('T')[0],es=wEnd.toISOString().split('T')[0];var count=cs.filter(function(c){return c.d>=ss&&c.d<es;}).length;if(count>=target)streak++;else break;}
  return streak;
}

function isDayWon(ds,dailyHabits,comps) {
  if(!dailyHabits.length) return false;
  var ids=dailyHabits.map(function(h){return h.id;});
  var totalPossibleXP=dailyHabits.reduce(function(a,h){return a+DIFF[h.diff].xp;},0);
  var minH=Math.max(1,Math.ceil(dailyHabits.length*0.8));
  var minXP=Math.min(50,totalPossibleXP);
  var dc=comps.filter(function(c){return c.d===ds&&ids.includes(c.hid);});
  var dxp=dc.reduce(function(a,c){return a+(c.xp||0);},0);
  var taskBonus=getT().filter(function(t){return t.completedDate===ds;}).reduce(function(a,t){return a+(TASK_XP[t.pri]||10);},0);
  return dc.length>=minH&&(minXP===0||dxp+taskBonus>=minXP);
}
function getDaysWonStreak() {
  var habits=getH().filter(function(h){return h.active&&h.freq==='daily';});
  if(!habits.length) return 0;
  var comps=getC(),streak=0,d=new Date(_today());
  for(var i=0;i<365;i++){var ds=d.toISOString().split('T')[0];if(isDayWon(ds,habits,comps)){streak++;d.setDate(d.getDate()-1);}else if(i===0){d.setDate(d.getDate()-1);}else break;}
  return streak;
}

// Count consecutive days (going back from yesterday) with zero habit completions
// Regression triggers — any ONE of these fires regression immediately:
//   • 1 day with 0% completion (full day of no interaction)
//   • 2 consecutive days below 50%
//   • 3 consecutive days below 100%
//
// Once triggered, regression is active until today has at least one habit completed.
// Penalty depth scales with how many days since last good day:
//   days in regression 1–6  → drop 1 tier
//   days in regression 7+   → drop 2 tiers
function getRegressionState() {
  var cs = getC();
  var habits = getH().filter(function (h) {
